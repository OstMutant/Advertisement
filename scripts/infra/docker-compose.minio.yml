version: '3.8'

# Local development — MinIO (S3-compatible storage).
# Emulates Cloudflare R2 for local development.
#
# Start: docker-compose -f scripts/infra/docker-compose.minio.yml up -d
# Stop:  docker-compose -f scripts/infra/docker-compose.minio.yml down
#
# Console: http://localhost:9001
# API:     http://localhost:9000
# Login:   admin / admin12345

services:
  minio:
    container_name: advertisement-minio
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "${S3_PORT}:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY};
      mc mb --ignore-existing local/${S3_BUCKET};
      mc anonymous set public local/${S3_BUCKET};
      echo 'Bucket created successfully';
      "
    restart: on-failure

volumes:
  minio_data:
version: '3.8'

# Application service — production build verification.
# Use together with docker-compose.db.yml and docker-compose.minio.yml before deploying to Render.
#
# Local DB + MinIO (run from repo root — --project-directory required so docker-compose.db.yml's
# ${POSTGRES_IMAGE} finds the repo-root .env; see docker-compose.db.yml's own header comment):
# Start: docker compose --project-directory . -f scripts/infra/docker-compose.db.yml -f scripts/infra/docker-compose.minio.yml -f scripts/infra/docker-compose.app.yml up --build
# Stop:  docker compose --project-directory . -f scripts/infra/docker-compose.db.yml -f scripts/infra/docker-compose.minio.yml -f scripts/infra/docker-compose.app.yml down -v
#
# Neon DB + Supabase Storage (no local DB/MinIO needed):
# docker-compose -f scripts/infra/docker-compose.app.yml up --build (set env vars below)

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      # DB_PORT/S3_ENDPOINT's port here are the containers' own internal Docker-network ports
      # (always 5432/9000 regardless of the host-side ${DB_PORT}/${S3_PORT} mapping below) --
      # deliberately left literal, not parameterized from .env.
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      # Uncomment for Neon:
      # DB_HOST: ep-late-flower-a43sj7qz-pooler.us-east-1.aws.neon.tech
      # DB_NAME: neondb
      # DB_USER: neondb_owner
      # DB_PASSWORD: your_password
      # DB_SSL_PARAMS: "?sslmode=require&channel_binding=require"
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION}
      S3_PUBLIC_URL: http://localhost:${S3_PORT}/${S3_BUCKET}
      # Uncomment for Supabase Storage:
      # S3_ENDPOINT: https://<project-ref>.supabase.co/storage/v1/s3
      # S3_BUCKET: advertisement
      # S3_ACCESS_KEY: your_supabase_access_key
      # S3_SECRET_KEY: your_supabase_secret_key
      # S3_REGION: auto
      # S3_PUBLIC_URL: https://<project-ref>.supabase.co/storage/v1/object/public/advertisement
    ports:
      - "8080:8080"
    # NOTE: depends_on references services from scripts/infra/docker-compose.db.yml and scripts/infra/docker-compose.minio.yml.
    # Use this file together with those files (see commands above).
    # When deploying with Neon + Supabase Storage, omit this file's depends_on by running the app standalone.
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
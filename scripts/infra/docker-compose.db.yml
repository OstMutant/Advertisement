version: '3.8'

# Local development — database only.
# The application runs via IDE with the "dev" profile.
#
# Reads POSTGRES_IMAGE from the repo-root .env — Compose's default project directory is the
# directory containing this file (scripts/infra/), NOT the repo root, so --project-directory is
# required for that .env to actually be found. Always run from the repo root:
#
# Start: docker compose --project-directory . -f scripts/infra/docker-compose.db.yml up -d
# Stop:  docker compose --project-directory . -f scripts/infra/docker-compose.db.yml down

services:
  db:
    container_name: advertisement-db
    image: ${POSTGRES_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_DB: experiments
      POSTGRES_USER: experiments_user
      POSTGRES_PASSWORD: experiments_user_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U experiments_user -d experiments"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
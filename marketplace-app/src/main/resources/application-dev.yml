# Database connection for development (Local). ${VAR:default} placeholders resolve against the
# repo-root .env when a script sources it (e.g. deploy-dev.sh, run-local.bat); the defaults here
# are the same values .env ships, purely a safety net so an IDE dev run (which doesn't source
# .env) still works unmodified. See improvement-044.
spring:
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5432}/${DB_NAME:experiments}
    username: ${DB_USER:experiments_user}
    password: ${DB_PASSWORD:experiments_user_password}

# S3-compatible storage (MinIO locally)
storage:
  s3:
    endpoint: http://localhost:${S3_PORT:9000}
    public-url: http://localhost:${S3_PORT:9000}/${S3_BUCKET:advertisement}
    bucket: ${S3_BUCKET:advertisement}
    region: ${S3_REGION:us-east-1}
    access-key: ${S3_ACCESS_KEY:admin}
    secret-key: ${S3_SECRET_KEY:admin12345}
    enabled: true


<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 44" width="310" height="44">
  <defs>
    <!-- Horizontal amber gradient for main text -->
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f59e0b"/>
      <stop offset="55%"  stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <!-- Subtle drop-shadow -->
    <filter id="sh" x="-5%" y="-10%" width="115%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2"
                    flood-color="#b45309" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- ── BRICKS (left, 3 rows × 2 cols) ─────────────────────────── -->
  <!-- row 1 -->
  <rect x="0"  y="7"  width="13" height="7" rx="1.5" fill="#fbbf24"/>
  <rect x="15" y="7"  width="13" height="7" rx="1.5" fill="#fbbf24"/>
  <!-- row 2 (offset half-brick) -->
  <rect x="6"  y="16" width="13" height="7" rx="1.5" fill="#f59e0b"/>
  <rect x="21" y="16" width="7"  height="7" rx="1.5" fill="#f59e0b"/>
  <!-- row 3 -->
  <rect x="0"  y="25" width="8"  height="7" rx="1.5" fill="#d97706"/>
  <rect x="10" y="25" width="13" height="7" rx="1.5" fill="#d97706"/>
  <!-- mortar lines -->
  <line x1="0"  y1="15" x2="28" y2="15" stroke="#fffbeb" stroke-width="1"/>
  <line x1="0"  y1="24" x2="28" y2="24" stroke="#fffbeb" stroke-width="1"/>
  <line x1="14" y1="7"  x2="14" y2="14" stroke="#fffbeb" stroke-width="1"/>

  <!-- ── MAIN TEXT ───────────────────────────────────────────────── -->
  <!-- Extrusion shadow layer (gives 3-D punch) -->
  <text x="38" y="32"
        font-family="-apple-system,BlinkMacSystemFont,'Arial Black','Segoe UI',sans-serif"
        font-size="20" font-weight="900" letter-spacing="1.8"
        fill="#92400e" opacity="0.4">ANNOUNCEMENTS</text>
  <!-- Main layer with gradient -->
  <text x="36" y="30"
        font-family="-apple-system,BlinkMacSystemFont,'Arial Black','Segoe UI',sans-serif"
        font-size="20" font-weight="900" letter-spacing="1.8"
        fill="url(#tg)" filter="url(#sh)">ANNOUNCEMENTS</text>

  <!-- ── HAMMER ─────────────────────────────────────────────────── -->
  <!-- head -->
  <rect x="264" y="8"  width="16" height="9" rx="2" fill="#475569"/>
  <!-- striking face accent -->
  <rect x="276" y="8"  width="4"  height="9" rx="1" fill="#334155"/>
  <!-- handle -->
  <rect x="268" y="16" width="4.5" height="18" rx="2" fill="#78350f"/>

  <!-- ── PLIERS (пласкогупці) ────────────────────────────────────── -->
  <!-- jaws (flat, closed) -->
  <rect x="287" y="7"  width="10" height="5" rx="1" fill="#64748b"/>
  <rect x="298" y="7"  width="9"  height="5" rx="1" fill="#64748b"/>
  <!-- pivot -->
  <circle cx="297" cy="14" r="2" fill="#334155"/>
  <!-- handles spreading apart -->
  <line x1="293" y1="13" x2="289" y2="32" stroke="#64748b" stroke-width="4"
        stroke-linecap="round"/>
  <line x1="301" y1="13" x2="306" y2="32" stroke="#64748b" stroke-width="4"
        stroke-linecap="round"/>
</svg>

# Database connection for production (Cloud/Docker)
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}${DB_SSL_PARAMS:}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

# S3-compatible storage (Cloudflare R2 in prod)
storage:
  s3:
    endpoint: ${S3_ENDPOINT}
    public-url: ${S3_PUBLIC_URL}
    region: ${S3_REGION}
    access-key: ${S3_ACCESS_KEY}
    secret-key: ${S3_SECRET_KEY}
    bucket: ${S3_BUCKET}

# Vaadin framework settings
vaadin:
  productionMode: true

# Render (and most PaaS) terminate the connection at their own edge and forward to this
# instance over their internal network — without this, request.getRemoteAddr() returns
# Render's proxy address for every user, not the real client IP (see improvement-022).
server:
  forward-headers-strategy: framework

# Expose only health endpoint in production (load balancer probe)
management:
  endpoints:
    web:
      exposure:
        include: health
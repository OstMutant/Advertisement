# Database connection for development (Local)
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/experiments
    username: experiments_user
    password: experiments_user_password

  # Run only changesets tagged with "dev" context (includes test data)
  liquibase:
    contexts: dev

# S3-compatible storage (MinIO locally)
storage:
  s3:
    endpoint: http://localhost:9000
    region: us-east-1
    access-key: admin
    secret-key: admin12345
    bucket: advertisement

# Vaadin framework settings
vaadin:
  productionMode: false
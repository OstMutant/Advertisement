# Database connection for production (Cloud/Docker)
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}${DB_SSL_PARAMS:}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  # Only run changesets without context or with "prod" context (excludes test data)
  liquibase:
    contexts: prod

# Vaadin framework settings
vaadin:
  productionMode: true